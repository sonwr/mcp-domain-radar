  <!-- Title -->
  <text x="160" y="182" fill="#f0f6fc" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle">domain-radar</text>
  <text x="160" y="195" fill="#8b949e" font-family="monospace" font-size="9" text-anchor="middle">scan domains. find names. ship faster.</text>
</svg>
