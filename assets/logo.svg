  <rect class="p1" x="172" y="96" width="8" height="8"/>
  <rect class="p1" x="180" y="96" width="8" height="8"/>

  <rect class="p1" x="124" y="104" width="8" height="8"/>
  <rect class="p1" x="132" y="104" width="8" height="8"/>
  <rect class="p1" x="180" y="104" width="8" height="8"/>
