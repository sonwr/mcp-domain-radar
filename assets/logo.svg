    .p4 { fill: #ff7b72; }
    .p5 { fill: #d2a8ff; }
    .eye { fill: #f0f6fc; }
    .dot { fill: #58a6ff; opacity: 0.3; }
  </style>

  <rect class="bg" width="320" height="200" rx="12"/>

  <!-- Radar waves (top) -->
  <rect class="dot" x="148" y="16" width="8" height="8"/>
