  <!-- Antenna -->
  <rect class="p1" x="156" y="36" width="8" height="8"/>

  <!-- Invader head row 1 -->
  <rect class="p1" x="132" y="48" width="8" height="8"/>
  <rect class="p1" x="140" y="48" width="8" height="8"/>
