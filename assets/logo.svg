  <rect class="p1" x="156" y="56" width="8" height="8"/>
  <rect class="p1" x="164" y="56" width="8" height="8"/>
  <rect class="p1" x="172" y="56" width="8" height="8"/>
  <rect class="p1" x="180" y="56" width="8" height="8"/>
  <rect class="p1" x="188" y="56" width="8" height="8"/>

