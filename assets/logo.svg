  <!-- Domain bullets shooting -->
  <!-- .com -->
  <rect class="p2" x="44" y="128" width="8" height="8"/>
  <rect class="p2" x="52" y="128" width="8" height="8"/>
  <rect class="p2" x="60" y="128" width="8" height="8"/>
  <text x="42" y="148" fill="#39d353" font-family="monospace" font-size="11" font-weight="bold">.com</text>

  <!-- .ai -->
  <rect class="p3" x="108" y="136" width="8" height="8"/>
